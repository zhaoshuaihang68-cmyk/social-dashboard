<style>
:root {
  --bg-primary: #f5f6fa;
  --bg-card: #ffffff;
  --bg-input: #f9fafb;
  --border: #e5e7eb;
  --text-primary: #1a1a2e;
  --text-secondary: #4a4a6a;
  --text-muted: #8e8ea0;
  --accent: #7c3aed;
  --accent2: #00cec9;
  --success: #00b894;
  --danger: #ff7675;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background: var(--bg-primary); color: var(--text-primary); min-height:100vh;
}
.header{
  background: #ffffff; border-bottom:1px solid #e5e7eb;
  padding:16px 28px; display:flex; align-items:center; justify-content:space-between;
}
.header h1{font-size:1.3rem;font-weight:700;letter-spacing:-0.02em;}
.header .sub{font-size:0.72rem;color:var(--text-muted);display:block;}
.main{padding:20px 28px 28px;max-width:1400px;margin:0 auto;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.card-header h3{font-size:0.9rem;font-weight:700;}
.card-header .sub{font-size:0.7rem;color:var(--text-muted);}
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:10px;margin-bottom:18px;}
.total-followers-card{
  background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(155,89,182,0.05));
  border:1.5px solid rgba(124,58,237,0.2); border-radius:var(--radius-sm);
  padding:13px 15px;
}
.total-followers-card .tf-label{font-size:0.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
.total-followers-card .tf-value{font-size:1.5rem;font-weight:800;color:var(--text-primary);margin:4px 0;letter-spacing:-0.02em;}
.total-followers-card .tf-sub{font-size:0.68rem;color:var(--text-muted);}
.metric-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;}
.metric-card .label{font-size:0.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
.metric-card .value{font-size:1.5rem;font-weight:800;margin:3px 0;}
.metric-card .change{font-size:0.7rem;margin-top:2px;}
.metric-card .change.up{color:var(--success);}
.metric-card .change.down{color:var(--danger);}
.metric-card .change.flat{color:var(--text-muted);}
.period-pills{display:flex;gap:6px;margin-bottom:16px;align-items:center;}
.period-pills .label{font-size:0.7rem;color:var(--text-muted);margin-right:6px;}
.period-pill{padding:6px 18px;border-radius:99px;font-size:0.74rem;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--bg-input);color:var(--text-secondary);transition:all .2s;font-family:inherit;}
.period-pill:hover{border-color:var(--accent);color:var(--text-primary);}
.period-pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.period-note{font-size:0.68rem;color:var(--text-muted);margin-left:auto;}
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:18px;}
.summary-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 15px;}
.summary-card .label{font-size:0.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;}
.summary-card .main-val{font-size:1.25rem;font-weight:800;margin:2px 0;}
.summary-card .sub-val{font-size:0.7rem;color:var(--text-muted);}
.chart-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:18px;}
.chart-box h4{font-size:0.8rem;color:#4a4a6a;margin-bottom:10px;}
.chart-wrap{position:relative;height:300px;}
.chart-wrap canvas{width:100%!important;}
.table-wrap{overflow-x:auto;max-height:420px;overflow-y:auto;}
.data-table{width:100%;border-collapse:collapse;font-size:0.76rem;}
.data-table th{background:#f3eeff;padding:9px 10px;text-align:left;font-weight:700;color:#5b21b6;border-bottom:2px solid #d8c9ff;position:sticky;top:0;z-index:1;white-space:nowrap;}
.data-table td{padding:7px 10px;border-bottom:1px solid #f0f0f5;white-space:nowrap;}
.data-table tr:hover td{background:rgba(124,58,237,0.04);}
.data-table .num{text-align:right;font-variant-numeric:tabular-nums;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px;}
</style>
</head>

  for (var i = 1; i < cards.length; i++) {
    var c = cards[i];
    html += '<div class="metric-card"><div class="label">' + c.label + '</div><div class="value">' + c.value + '</div></div>';
  }
  document.getElementById('overviewCards').innerHTML = html;
}

function renderSummaryCards() {
  var subset = insData.slice(0, periodDays);
  var tv = 0, tr = 0, ti = 0, tp = 0, tf = 0;
  for (var i = 0; i < subset.length; i++) {
    tv += subset[i].views || 0;
    tr += subset[i].reach || 0;
    ti += subset[i].interactions || 0;
    tp += subset[i].profileVisits || 0;
    tf += subset[i].follows || 0;
  }
  var ff = subset[subset.length-1] ? subset[subset.length-1].total_followers : 0;
  var lf = subset[0] ? subset[0].total_followers : 0;
  var cards = [
    { label: '总观看量', main: tv.toLocaleString(), sub: periodDays + '天累计' },
    { label: '总触达', main: tr.toLocaleString(), sub: periodDays + '天累计' },
    { label: '总互动', main: ti.toLocaleString(), sub: periodDays + '天累计' },
    { label: '总主页访问', main: tp.toLocaleString(), sub: periodDays + '天累计' },
    { label: '净增粉丝', main: '+' + (lf-ff).toLocaleString(), sub: ff.toLocaleString() + ' → ' + lf.toLocaleString() }
  ];
  var html = '';
  for (var i = 0; i < cards.length; i++) {
    html += '<div class="summary-card"><div class="label">' + cards[i].label + '</div><div class="main-val">' + cards[i].main + '</div><div class="sub-val">' + cards[i].sub + '</div></div>';
  }
  document.getElementById('summaryCards').innerHTML = html;
  document.getElementById('periodNote').textContent = subset.length > 0 ? subset[subset.length-1].date + ' - ' + subset[0].date : '';
}

function renderChart() {
  var subset = insData.slice(0, periodDays).reverse();
  var labels = subset.map(function(d){ return d.date.slice(5); });
  var views = subset.map(function(d){ return d.views||0; });
  var reach = subset.map(function(d){ return d.reach||0; });
  var interactions = subset.map(function(d){ return d.interactions||0; });
  var follows = subset.map(function(d){ return d.follows||0; });
  var visits = subset.map(function(d){ return d.profileVisits||0; });

  // Main chart
  if (chartMain) chartMain.destroy();
  var ctx1 = document.getElementById('chartMain').getContext('2d');
  chartMain = new Chart(ctx1, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        { label: '观看量', data: views, borderColor: '#7c3aed', backgroundColor: 'rgba(124,58,237,0.05)', fill: true, tension: 0.3, yAxisID: 'y', borderWidth: 2 },
        { label: '触达', data: reach, borderColor: '#00cec9', backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y', borderWidth: 1.5, borderDash: [5,3] },
        { label: '互动', data: interactions, borderColor: '#fdcb6e', backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y', borderWidth: 1.5 },
        { label: '新增粉丝', data: follows, borderColor: '#00b894', backgroundColor: 'transparent', tension: 0.3, yAxisID: 'y1', borderWidth: 2, pointRadius: 3 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: { legend: { position: 'top', labels: { boxWidth: 12, padding: 16, font: { size: 10 } } } },
      scales: {
        y: { type: 'linear', position: 'left', title: { display: true, text: 'Views / Reach / Interactions' } },
        y1: { type: 'linear', position: 'right', title: { display: true, text: 'Follows' }, grid: { drawOnChartArea: false } }
      }
    }
  });

  // Aux chart
  if (chartAux) chartAux.destroy();
  var ctx2 = document.getElementById('chartAux').getContext('2d');
  chartAux = new Chart(ctx2, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        { label: '主页访问', data: visits, backgroundColor: 'rgba(124,58,237,0.6)', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true } }
    }
  });
}

function renderTable() {
  var subset = insData.slice(0, periodDays);
  var html = '<table class="data-table"><thead><tr><th>日期</th><th>观看量</th><th>触达</th><th>互动</th><th>链接点击</th><th>主页访问</th><th>新增粉丝</th><th>粉丝总数</th></tr></thead><tbody>';
  for (var i = 0; i < subset.length; i++) {
    var r = subset[i];
    html += '<tr><td>' + r.date + '</td><td class="num">' + (r.views||0).toLocaleString() + '</td><td class="num">' + (r.reach||0).toLocaleString() + '</td><td class="num">' + (r.interactions||0).toLocaleString() + '</td><td class="num">' + (r.linkClicks||0).toLocaleString() + '</td><td class="num">' + (r.profileVisits||0).toLocaleString() + '</td><td class="num">' + (r.follows||0).toLocaleString() + '</td><td class="num">' + (r.total_followers||0).toLocaleString() + '</td></tr>';
  }
  html += '</tbody></table>';
  document.getElementById('dsDataTable').innerHTML = html;
  document.getElementById('recordCount').textContent = '显示 ' + subset.length + ' / ' + insData.length + ' 条';
}

function setPeriod(days) {
  periodDays = days;
  document.querySelectorAll('.period-pill').forEach(function(el){ el.classList.remove('active'); });
  document.querySelector('.period-pill[data-days="' + days + '"]').classList.add('active');
  renderSummaryCards();
  renderChart();
  renderTable();
}

renderAll();
</script>
</body>
</html>
