<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社交媒体数据仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg: #f8f9fc; --card: #fff; --border: #e8ecf1;
  --text: #1a1a2e; --muted: #8e8ea0;
  --ins: #e1306c; --xhs: #ff2442; --success: #00b894; --warning: #fdcb6e;
  --radius: 14px; --shadow: 0 2px 12px rgba(0,0,0,0.05);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background:var(--bg); color:var(--text); min-height:100vh;
}
.header{
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color:#fff; padding:28px 36px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px;
}
.header h1{font-size:1.6rem;font-weight:800;letter-spacing:-0.02em;}

/* Toggle groups */
.toggle-group{display:flex;gap:0;background:rgba(255,255,255,0.15);border-radius:10px;overflow:hidden;}
.toggle-btn{
  padding:9px 24px;font-size:0.82rem;font-weight:700;border:none;cursor:pointer;
  background:transparent;color:rgba(255,255,255,0.75);transition:all 0.2s;white-space:nowrap;
}
.toggle-btn.active{background:#fff;color:#1a1a2e;}
.toggle-btn:hover:not(.active){background:rgba(255,255,255,0.1);}

.main{padding:24px 36px;max-width:1400px;margin:0 auto;}

/* Platform Header */
.platform-title{
  font-size:1.05rem;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:10px;
}
.platform-title .dot{width:12px;height:12px;border-radius:50%;display:inline-block;}
.platform-title .dot.ins-dot-bg{background:var(--ins);}
.platform-title .dot.xhs-dot-bg{background:var(--xhs);}

/* Overview Cards */
.overview-grid{
  display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:12px; margin-bottom:20px;
}
.overview-card{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px 18px; box-shadow:var(--shadow);
}
.overview-card .label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.overview-card .value{font-size:1.5rem;font-weight:800;margin:4px 0;}

/* Platform Summary Card */
.platform-summary{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:18px 20px; box-shadow:var(--shadow); margin-bottom:20px;
  display:flex;flex-wrap:wrap;gap:12px 32px;align-items:center;
}
.platform-summary .ps-metric{text-align:center;}
.platform-summary .ps-metric .ml{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.platform-summary .ps-metric .mv{font-size:1.3rem;font-weight:700;}
.platform-summary .followers-info{
  margin-left:auto;font-size:0.75rem;display:flex;align-items:center;gap:6px;
}
.platform-summary .followers-info strong{font-size:1rem;}

/* Charts */
.chart-section{margin-bottom:20px;}
.chart-box{
  background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
  padding:16px 18px; box-shadow:var(--shadow); margin-bottom:14px;
}
.chart-box h4{font-size:0.78rem;font-weight:700;color:var(--text);margin-bottom:10px;}
.chart-wrap{position:relative;height:320px;}
.chart-wrap canvas{width:100%!important;}

/* Table */
.data-table-section{margin-bottom:20px;}
.data-table-section h3{font-size:0.85rem;font-weight:700;margin-bottom:10px;}
.table-wrap{overflow-x:auto;max-height:500px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);}
table{width:100%;border-collapse:collapse;font-size:0.73rem;}
th{
  background:#f3eeff;padding:9px 10px;text-align:left;font-weight:700;color:#5b21b6;
  border-bottom:2px solid #d8c9ff;position:sticky;top:0;z-index:1;white-space:nowrap;
}
td{padding:7px 10px;border-bottom:1px solid #f0f0f5;white-space:nowrap;}
.num{text-align:right;font-variant-numeric:tabular-nums;}
tr:hover td{background:rgba(124,58,237,0.04);}
.total-row td{font-weight:700;background:#faf8ff;border-top:2px solid #d8c9ff;}
.footer{text-align:center;padding:24px;color:var(--muted);font-size:0.7rem;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px;}

.hidden{display:none!important;}
</style>
</head>

// === State ===
var currentDays = 90;
var currentPlatform = 'ins';
var insCharts = { combined: null };
var xhsCharts = { combined: null };

// === Helpers ===
function sliceData(data, days) {
  return data.slice(-days);
}

function sum(data, key) {
  var s = 0; data.forEach(function(d) { s += d[key] || 0; }); return s;
}

// === Platform Switch ===
function switchPlatform(platform) {
  currentPlatform = platform;
  var btnIns = document.getElementById('btnIns');
  var btnXhs = document.getElementById('btnXhs');
  var secIns = document.getElementById('sectionIns');
  var secXhs = document.getElementById('sectionXhs');

  if (platform === 'ins') {
    btnIns.classList.add('active'); btnXhs.classList.remove('active');
    secIns.classList.remove('hidden'); secXhs.classList.add('hidden');
    if (insCharts.combined && insCharts.combined.resize) insCharts.combined.resize();
  } else {
    btnXhs.classList.add('active'); btnIns.classList.remove('active');
    secXhs.classList.remove('hidden'); secIns.classList.add('hidden');
    if (xhsCharts.combined && xhsCharts.combined.resize) xhsCharts.combined.resize();
  }
}

// === Rebuild all UI for given days ===
function rebuildAll(days) {
  currentDays = days;
  buildIns(days);
  buildXhs(days);
}

// === Build Instagram ===
function buildIns(days) {
  var data = sliceData(insData, days);
  var labels = data.map(function(d) { return d.date.slice(5); });
  var accent = '#e1306c';

  buildOverview('overviewIns', data, accent);
  buildSummary('summaryIns', data, 'Instagram', accent);
  buildTable('tableIns', data);

  if (insCharts.combined) insCharts.combined.destroy();
  insCharts.combined = makeCombinedChart('chartInsCombined', data, labels, accent);

  if (currentPlatform === 'ins') {
    insCharts.combined.resize();
  }
}

// === Build Xiaohongshu ===
function buildXhs(days) {
  var data = sliceData(xhsData, days);
  var labels = data.map(function(d) { return d.date.slice(5); });
  var accent = '#ff2442';

  buildOverview('overviewXhs', data, accent);
  buildSummary('summaryXhs', data, '小红书', accent);
  buildTable('tableXhs', data);

  if (xhsCharts.combined) xhsCharts.combined.destroy();
  xhsCharts.combined = makeCombinedChart('chartXhsCombined', data, labels, accent);

  if (currentPlatform === 'xhs') {
    xhsCharts.combined.resize();
  }
}

// === Smart helpers: find non-zero data point ===
function findLastNonZero(data, key) {
  for (var i = data.length - 1; i >= 0; i--) {
    if (data[i][key] && data[i][key] !== 0) return data[i];
  }
  return null;
}
function findFirstNonZero(data, key) {
  for (var i = 0; i < data.length; i++) {
    if (data[i][key] && data[i][key] !== 0) return data[i];
  }
  return null;
}

// === Smart renderCards: skip all-zero entries, fallback to nearest date with data ===
function renderCards(data, metricKey, fallbackFn) {
  var total = sum(data, metricKey);
  // If total is zero, try to find the most recent non-zero entry
  if (total === 0 && fallbackFn) {
    var found = fallbackFn(data, metricKey);
    if (found) {
      return { value: found[metricKey], fallbackDate: found.date, isFallback: true };
    }
  }
  return { value: total, isFallback: false };
}

// === Overview Cards ===
var metricLabels = {
  views: '观看量', reach: '触达', interactions: '互动',
  linkClicks: '链接点击', profileVisits: '主页访问', follows: '新增粉丝'
};
var order = ['views','reach','interactions','profileVisits','follows'];

function buildOverview(gridId, data, accent) {
  var grid = document.getElementById(gridId);
  grid.innerHTML = '';
  order.forEach(function(m) {
    var result = renderCards(data, m, findLastNonZero);
    var card = document.createElement('div');
    card.className = 'overview-card';
    card.style.borderLeft = '3px solid ' + accent;
    var valueHtml = result.value.toLocaleString();
    if (result.isFallback) {
      valueHtml += ' <span style="font-size:0.55rem;color:#999;">(' + result.fallbackDate.slice(5) + ')</span>';
    }
    card.innerHTML = '<div class="label">' + metricLabels[m] + '</div>' +
      '<div class="value">' + valueHtml + '</div>';
    grid.appendChild(card);
  });
}

    html += '<tr>' +
      '<td>' + d.date + '</td>' +
      '<td class="num">' + (d.views||0).toLocaleString() + '</td>' +
      '<td class="num">' + (d.reach||0).toLocaleString() + '</td>' +
      '<td class="num">' + (d.interactions||0).toLocaleString() + '</td>' +
      '<td class="num">' + (d.profileVisits||0).toLocaleString() + '</td>' +
      '<td class="num">' + (d.follows||0).toLocaleString() + '</td>' +
      '<td class="num">' + (d.total_followers||0).toLocaleString() + '</td>' +
    '</tr>';
  });
  html += '<tr class="total-row">' +
    '<td><strong>合计</strong></td>' +
    '<td class="num"><strong>' + tViews.toLocaleString() + '</strong></td>' +
    '<td class="num"><strong>' + tReach.toLocaleString() + '</strong></td>' +
    '<td class="num"><strong>' + tInt.toLocaleString() + '</strong></td>' +
    '<td class="num"><strong>' + tPV.toLocaleString() + '</strong></td>' +
    '<td class="num"><strong>' + tFol.toLocaleString() + '</strong></td>' +
    '<td class="num">—</td>' +
  '</tr></tbody></table>';
  el.innerHTML = html;
}

// === Chart defaults ===
var chartDefaults = {
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { position: 'top', labels: { boxWidth: 12, padding: 12, font: { size: 10 } } } },
  scales: {
    x: { ticks: { maxTicksLimit: 10, font: { size: 9 } }, grid: { display: false } },
    y: { ticks: { font: { size: 9 } }, beginAtZero: true }
  },
  interaction: { intersect: false, mode: 'index' }
};

// === Combined Chart: Views + Reach + Interactions + Followers ===
function makeCombinedChart(canvasId, data, labels, accent) {
  var ctx = document.getElementById(canvasId).getContext('2d');
  var cfg = JSON.parse(JSON.stringify(chartDefaults));

  // Triple Y axes: left for Views+Interactions, right for Reach, far-right (y2) for Followers
  cfg.scales.y.title = { display: true, text: '观看量 / 互动', font: { size: 9 } };
  cfg.scales.y1 = {
    type: 'linear', position: 'right', beginAtZero: true,
    title: { display: true, text: '触达', font: { size: 9 } },
    ticks: { font: { size: 9 } },
    grid: { display: false }
  };
  cfg.scales.y2 = {
    type: 'linear', position: 'right', beginAtZero: false,
    title: { display: true, text: '粉丝总数', font: { size: 9 } },
    ticks: { font: { size: 9 } },
    grid: { display: false }
  };

  var datasets = [
    {
      label: '观看量',
      data: data.map(function(d){return d.views;}),
      borderColor: accent,
      backgroundColor: accent.replace(')', ',0.08)').replace('rgb','rgba'),
      tension: 0.3, pointRadius: 0, borderWidth: 3.5, fill: true, yAxisID: 'y'
    },
    {
      label: '触达',
      data: data.map(function(d){return d.reach;}),
      borderColor: '#f39c12',
      backgroundColor: 'rgba(243,156,18,0.08)',
      tension: 0.3, pointRadius: 0, borderWidth: 3.5, fill: true, yAxisID: 'y1'
    },
    {
      label: '互动',
      data: data.map(function(d){return d.interactions;}),
      borderColor: '#00b894',
      backgroundColor: 'rgba(0,184,148,0.08)',
      tension: 0.3, pointRadius: 0, borderWidth: 3.5, fill: true, yAxisID: 'y'
    },
    {
      label: '粉丝总数',
      data: data.map(function(d){return d.total_followers||0;}),
      borderColor: '#9b59b6',
      backgroundColor: 'rgba(155,89,182,0.04)',
      borderDash: [6, 4],
      tension: 0.3, pointRadius: 0, borderWidth: 3.5, fill: false, yAxisID: 'y2'
    }
  ];

  return new Chart(ctx, { type: 'line', data: { labels: labels, datasets: datasets }, options: cfg });
}

// === Time Range Toggle ===
document.getElementById('timeToggle').addEventListener('click', function(e) {
  var btn = e.target.closest('button');
  if (!btn) return;
  var days = parseInt(btn.getAttribute('data-days'));
  if (days === currentDays) return;

  // Update active state
  this.querySelectorAll('.toggle-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');

  rebuildAll(days);
});

// === Init ===
rebuildAll(90);
</script>
