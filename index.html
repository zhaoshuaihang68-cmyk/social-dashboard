<style>
:root {
  --bg-primary: #f5f6fa;
  --bg-secondary: #ffffff;
  --bg-card: #ffffff;
  --bg-input: #f9fafb;
  --border: #e5e7eb;
  --text-primary: #1a1a2e;
  --text-secondary: #4a4a6a;
  --text-muted: #8e8ea0;
  --accent: #7c3aed;
  --accent2: #00cec9;
  --success: #00b894;
  --danger: #ff7675;
  --warning: #fdcb6e;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background: var(--bg-primary); color: var(--text-primary); min-height:100vh;
}
.header{
  background: #ffffff; border-bottom:1px solid #e5e7eb;
  padding:16px 28px; display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px;
}
.header h1{font-size:1.3rem;font-weight:700;letter-spacing:-0.02em;}
.header .sub{font-size:0.72rem;color:var(--text-muted);display:block;}
.main{padding:20px 28px 28px;max-width:1400px;margin:0 auto;}
.btn{padding:8px 16px;border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;
  border:1px solid var(--border);transition:all .2s;font-family:inherit;}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#6d28d9;}
.btn-secondary{background:var(--bg-input);color:var(--text-primary);}
.btn-secondary:hover{background:#e5e7eb;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.card-header h3{font-size:0.9rem;font-weight:700;}
.card-header .sub{font-size:0.7rem;color:var(--text-muted);}
.fallback-banner{
  display:flex; align-items:center; justify-content:space-between;
  background: linear-gradient(135deg, rgba(253,203,110,0.15), rgba(253,203,110,0.05));
  border:1px solid rgba(253,203,110,0.3); border-radius:var(--radius-sm);
  padding:10px 18px; margin-bottom:18px; font-size:0.78rem; color:#b8860b;
}
.fallback-banner .banner-close{
  background:none; border:none; color:#8e8ea0; cursor:pointer; font-size:1.1rem;
  padding:0 4px; line-height:1; transition:color .2s;
}
.fallback-banner .banner-close:hover{color:#1a1a2e;}
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:10px;margin-bottom:18px;}
.total-followers-card{
  background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(155,89,182,0.05));
  border:1.5px solid rgba(124,58,237,0.2); border-radius:var(--radius-sm);
  padding:13px 15px; position:relative;
}
.total-followers-card .tf-label{font-size:0.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
.total-followers-card .tf-value{font-size:1.5rem;font-weight:800;color:var(--text-primary);margin:4px 0;letter-spacing:-0.02em;}
.total-followers-card .tf-sub{font-size:0.68rem;color:var(--text-muted);}
.total-followers-card .change{font-size:0.7rem;margin-top:2px;}
.total-followers-card .change.up{color:var(--success);}
.total-followers-card .change.down{color:var(--danger);}
.total-followers-card .change.flat{color:var(--text-muted);}
.metric-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;}
.metric-card .label{font-size:0.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
.metric-card .value{font-size:1.5rem;font-weight:800;margin:3px 0;}
.metric-card .change{font-size:0.7rem;margin-top:2px;}
.metric-card .change.up{color:var(--success);}
.metric-card .change.down{color:var(--danger);}
.metric-card .change.flat{color:var(--text-muted);}
.period-pills{display:flex;gap:6px;margin-bottom:16px;align-items:center;}
.period-pills .label{font-size:0.7rem;color:var(--text-muted);margin-right:6px;}
.period-pill{padding:6px 18px;border-radius:99px;font-size:0.74rem;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--bg-input);color:var(--text-secondary);transition:all .2s;font-family:inherit;}
.period-pill:hover{border-color:var(--accent);color:var(--text-primary);}
.period-pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.platform-tabs{display:flex;gap:6px;align-items:center;margin-left:16px;}
.platform-tab{padding:6px 16px;border-radius:99px;font-size:0.74rem;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--bg-input);color:var(--text-secondary);transition:all .2s;font-family:inherit;}
.platform-tab:hover{border-color:var(--accent);color:var(--text-primary);}
.platform-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.period-note{font-size:0.68rem;color:var(--text-muted);margin-left:auto;}
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:18px;}
.summary-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 15px;}
.summary-card .label{font-size:0.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;}
.summary-card .main-val{font-size:1.25rem;font-weight:800;margin:2px 0;}
.summary-card .sub-val{font-size:0.7rem;color:var(--text-muted);}
.summary-card.followers{border-left:3px solid var(--accent);border-color:#9b59b6;box-shadow:inset 0 0 30px rgba(124,58,237,0.03);}
.chart-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:18px;}
.chart-box h4{font-size:0.8rem;color:#4a4a6a;margin-bottom:10px;}
.chart-wrap{position:relative;height:300px;}
.chart-wrap.small{height:240px;}
.chart-wrap canvas{width:100%!important;}
.empty-state{text-align:center;padding:48px 16px;color:var(--text-muted);}
.empty-state .empty-icon{font-size:2.5rem;opacity:.3;margin-bottom:10px;}
.empty-state p{font-size:0.82rem;}
.table-wrap{overflow-x:auto;max-height:420px;overflow-y:auto;}
.data-table{width:100%;border-collapse:collapse;font-size:0.76rem;}
.data-table th{background:#f3eeff;padding:9px 10px;text-align:left;font-weight:700;color:#5b21b6;border-bottom:2px solid #d8c9ff;position:sticky;top:0;z-index:1;white-space:nowrap;}
.data-table td{padding:7px 10px;border-bottom:1px solid #f0f0f5;white-space:nowrap;}
.data-table tr:hover td{background:rgba(124,58,237,0.04);}
.data-table .num{text-align:right;font-variant-numeric:tabular-nums;}
.ai-section{margin-top:18px;}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:760px){.ai-grid{grid-template-columns:1fr;}}
.ai-insights{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start;}
.ai-insight-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;}
.ai-insight-card .ai-label{font-size:0.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.ai-insight-card .ai-value{font-size:1.05rem;font-weight:800;color:var(--text-primary);}
.ai-insight-card .ai-sub{font-size:0.66rem;color:var(--text-muted);margin-top:2px;}
.ai-insight-card .ai-trend.up{color:var(--success);}
.ai-insight-card .ai-trend.down{color:var(--danger);}
.ai-suggestions{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;}
.ai-suggestions .ai-title{font-size:0.72rem;font-weight:700;color:var(--accent);margin-bottom:10px;letter-spacing:.03em;}
.ai-suggestion-item{display:flex;gap:8px;margin-bottom:8px;font-size:0.72rem;color:var(--text-secondary);line-height:1.5;align-items:flex-start;}
.ai-suggestion-item:last-child{margin-bottom:0;}
.ai-bullet{flex-shrink:0;width:8px;height:8px;border-radius:50%;background:#9b59b6;margin-top:5px;}
.ai-empty{text-align:center;padding:24px;color:var(--text-muted);font-size:0.74rem;grid-column:1/-1;}
.ai-na{color:var(--text-muted);font-style:italic;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px;}
.footer{text-align:center;padding:16px;font-size:0.68rem;color:var(--text-muted);border-top:1px solid var(--border);margin-top:24px;}
.footer a{color:var(--accent);text-decoration:none;}
</style>
</head>

<div class="header">
  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;">

      <button class="platform-tab active" data-platform="ins" onclick="switchPlatform('ins')">Ins</button>

<div class="main">

  <!-- Data Table -->

  <!-- AI Analysis -->

    <div class="card-header"><h3>AI 数据分析与建议</h3><span class="sub" id="aiPeriodLabel"></span></div>
    <div class="ai-grid" id="aiGrid"></div>
  </div>

</div>

<div class="footer">

// ======================== DATA HELPERS ========================
function getActiveData() {
  if (currentPlatform === 'ins') return insData;
  return xhsData;
}

function getAltData() {
  if (currentPlatform === 'ins') return xhsData;
  return insData;
}

function getPlatformName(platform) {
  return platform === 'ins' ? 'Ins' : '小红书';
}

function getDataForPeriod(data, days) {
  if (!data || data.length === 0) return [];
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  var cutoffStr = cutoff.toISOString().slice(0,10);
  return data.filter(function(d) { return d.date >= cutoffStr; });
}

function fmtNum(n) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 10000) return (n/1000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function fmtDelta(n) {
  if (n === null || n === undefined || isNaN(n)) return '0';
  if (n > 0) return '+' + fmtNum(n);
  if (n < 0) return fmtNum(n);
  return '0';
}

// ======================== SMART FALLBACK ========================
function switchPlatform(platform) {
  var targetData = platform === 'ins' ? insData : xhsData;
  var altData = platform === 'ins' ? xhsData : insData;
  var targetName = getPlatformName(platform);
  var altName = getPlatformName(platform === 'ins' ? 'xhs' : 'ins');

  // Smart fallback: if target platform has no data, use alternative
  if (!targetData || targetData.length === 0) {
    if (altData && altData.length > 0) {
      currentPlatform = platform === 'ins' ? 'xhs' : 'ins';
      fallbackActive = true;
      showFallback(targetName + ' 暂无数据，已自动切换到 ' + altName);
    } else {
      currentPlatform = platform;
      fallbackActive = false;
    }
  } else {
    currentPlatform = platform;
    fallbackActive = false;
    hideFallback();
  }

  updatePlatformUI();
  updatePageTitle();
  renderAll();
}

function showFallback(msg) {
  fallbackActive = true;
  document.getElementById('fallbackBanner').style.display = 'flex';
  document.getElementById('fallbackMsg').textContent = msg;
}

function hideFallback() {
  fallbackActive = false;
  document.getElementById('fallbackBanner').style.display = 'none';
}

function dismissFallback() {
  hideFallback();
}

function updatePlatformUI() {
  var tabs = document.querySelectorAll('.platform-tab');
  tabs.forEach(function(t) {
    t.classList.toggle('active', t.dataset.platform === currentPlatform);
  });
}

function updatePageTitle() {
  var name = getPlatformName(currentPlatform);
  document.getElementById('pageTitle').textContent = name + ' 数据总览';
}

// ======================== RENDER ALL ========================
function renderAll() {
  var data = getActiveData();
  if (!data || data.length === 0) {
    showEmpty();
    return;
  }
  renderOverviewCards(data);
  renderSummaryCards(data);
  renderChartMain(data);
  renderChartAux(data);
  renderTable(data);
  renderAI(data);
}

function showEmpty() {
  document.getElementById('overviewCards').innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><p>暂无数据</p></div>';
  document.getElementById('summaryCards').innerHTML = '';
  document.getElementById('dsDataTable').innerHTML = '';
  document.getElementById('aiGrid').innerHTML = '<div class="ai-empty">暂无足够数据进行AI分析</div>';
  document.getElementById('recordCount').textContent = '';
  destroyCharts();
}

// ======================== OVERVIEW CARDS ========================
function renderOverviewCards(data) {
  var latest = data[0];
  var now = new Date();
  var yesterday = new Date(now);
  yesterday.setDate(yesterday.getDate() - 1);
  var yesterdayStr = yesterday.toISOString().slice(0,10);

  var prevDay = data.find(function(d) { return d.date === yesterdayStr; });
  if (!prevDay && data.length > 1) prevDay = data[1];

  function delta(cur, prev, field) {
    if (!prev) return {cls:'flat', text:'-'};
    var d = cur[field] - prev[field];
    if (d > 0) return {cls:'up', text:'+' + fmtNum(d)};
    if (d < 0) return {cls:'down', text:fmtNum(d)};
    return {cls:'flat', text:'0'};
  }

  var viewsD = delta(latest, prevDay, 'views');
  var reachD = delta(latest, prevDay, 'reach');
  var intD = delta(latest, prevDay, 'interactions');
  var pvD = delta(latest, prevDay, 'profileVisits');

  var tfDelta = null;
  if (latest.total_followers != null && prevDay && prevDay.total_followers != null) {
    var d = latest.total_followers - prevDay.total_followers;
    tfDelta = {cls: d > 0 ? 'up' : d < 0 ? 'down' : 'flat', text: fmtDelta(d)};
  }

  var html = '';
  // Total Followers card
  if (latest.total_followers != null) {
    html += '<div class="total-followers-card">';
    html += '<div class="tf-label">粉丝总数</div>';
    html += '<div class="tf-value">' + fmtNum(latest.total_followers) + '</div>';
    html += '<div class="tf-sub">截至 ' + latest.date + '</div>';
    if (tfDelta) {
      html += '<div class="change ' + tfDelta.cls + '">较昨日 ' + tfDelta.text + '</div>';
    }
    html += '</div>';
  }

  // Metric cards
  var metrics = [
    {label:'观看量', value:fmtNum(latest.views), delta:viewsD},
    {label:'触达', value:fmtNum(latest.reach), delta:reachD},
    {label:'内容互动', value:fmtNum(latest.interactions), delta:intD},
    {label:'主页访问', value:fmtNum(latest.profileVisits), delta:pvD}
  ];

  metrics.forEach(function(m) {
    html += '<div class="metric-card">';
    html += '<div class="label">' + m.label + '</div>';
    html += '<div class="value">' + m.value + '</div>';
    html += '<div class="change ' + m.delta.cls + '">较昨日 ' + m.delta.text + '</div>';
    html += '</div>';
  });

  document.getElementById('overviewCards').innerHTML = html;
}

// ======================== SUMMARY CARDS ========================
function renderSummaryCards(data) {
  var periodData = getDataForPeriod(data, currentPeriod);
  var totViews = 0, totReach = 0, totInt = 0, totPV = 0, totFollows = 0;
  var peakViews = {date:'', val:0}, peakReach = {date:'', val:0}, peakInt = {date:'', val:0};

  periodData.forEach(function(d) {
    totViews += d.views || 0;
    totReach += d.reach || 0;
    totInt += d.interactions || 0;
    totPV += d.profileVisits || 0;
    totFollows += d.follows || 0;

    if ((d.views||0) > peakViews.val) { peakViews = {date:d.date, val:d.views}; }
    if ((d.reach||0) > peakReach.val) { peakReach = {date:d.date, val:d.reach}; }
    if ((d.interactions||0) > peakInt.val) { peakInt = {date:d.date, val:d.interactions}; }
  });

  var latestTF = data[0].total_followers;
  var n = periodData.length;

  var html = '';
  html += buildSummaryCard('总观看量', fmtNum(totViews), '日均 ' + fmtNum(Math.round(totViews/n)), '');
  html += buildSummaryCard('总触达', fmtNum(totReach), '日均 ' + fmtNum(Math.round(totReach/n)), '');
  html += buildSummaryCard('总互动', fmtNum(totInt), '日均 ' + fmtNum(Math.round(totInt/n)), '');
  html += buildSummaryCard('主页访问', fmtNum(totPV), '日均 ' + fmtNum(Math.round(totPV/n)), '');
  html += buildSummaryCard('新增粉丝', fmtDelta(totFollows), '净变化', 'followers');
  if (latestTF != null) {
    html += buildSummaryCard('当前粉丝', fmtNum(latestTF), '截至 ' + data[0].date, 'followers');
  }

  // Peak highlights
  html += buildSummaryCard('峰值观看', fmtNum(peakViews.val), peakViews.date, '');
  html += buildSummaryCard('峰值触达', fmtNum(peakReach.val), peakReach.date, '');
  html += buildSummaryCard('峰值互动', fmtNum(peakInt.val), peakInt.date, '');

  document.getElementById('summaryCards').innerHTML = html;

  // Update period note
  var dateRange = '';
  if (periodData.length > 0) {
    dateRange = periodData[periodData.length-1].date + ' ~ ' + periodData[0].date;
  }
  document.getElementById('periodNote').textContent = currentPeriod + '天 · ' + dateRange + ' · ' + periodData.length + '条记录';
}

function buildSummaryCard(label, mainVal, subVal, extraClass) {
  var cls = extraClass ? 'summary-card ' + extraClass : 'summary-card';
  return '<div class="' + cls + '"><div class="label">' + label + '</div><div class="main-val">' + mainVal + '</div><div class="sub-val">' + subVal + '</div></div>';
}

// ======================== PERIOD ========================
function setPeriod(days) {
  currentPeriod = days;
  document.querySelectorAll('.period-pill').forEach(function(p) {
    p.classList.toggle('active', parseInt(p.dataset.days) === days);
  });
  renderAll();
}

// ======================== CHARTS ========================
function destroyCharts() {
  if (chartMain) { chartMain.destroy(); chartMain = null; }
  if (chartAux2) { chartAux2.destroy(); chartAux2 = null; }
}

function renderChartMain(data) {
  destroyCharts();
  var periodData = getDataForPeriod(data, currentPeriod);
  if (periodData.length === 0) return;

  // Reverse for chronological order
  periodData = periodData.slice().reverse();

  var labels = periodData.map(function(d) { return d.date.slice(5); });
  var viewsData = periodData.map(function(d) { return d.views || 0; });
  var reachData = periodData.map(function(d) { return d.reach || 0; });
  var intData = periodData.map(function(d) { return d.interactions || 0; });
  var followsData = periodData.map(function(d) { return d.follows || 0; });

  var ctx = document.getElementById('chartMain').getContext('2d');
  chartMain = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: '观看量',
          data: viewsData,
          borderColor: COLORS.views,
          backgroundColor: 'rgba(124,58,237,0.05)',
          borderWidth: 2,
          tension: 0.3,
          fill: true,
          yAxisID: 'y'
        },
        {
          label: '触达',
          data: reachData,
          borderColor: COLORS.reach,
          borderWidth: 2,
          tension: 0.3,
          fill: false,
          yAxisID: 'y'
        },
        {
          label: '内容互动',
          data: intData,
          borderColor: COLORS.interactions,
          borderWidth: 2,
          tension: 0.3,
          fill: false,
          yAxisID: 'y'
        },
        {
          label: '新增粉丝',
          data: followsData,
          borderColor: COLORS.follows,
          backgroundColor: 'rgba(225,112,85,0.1)',
          borderWidth: 2,
          tension: 0.3,
          fill: true,
          yAxisID: 'y1',
          borderDash: [4, 3]
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { usePointStyle: true, padding: 20, font: {size:11} }
        }
      },
      scales: {
        y: {
          type: 'linear',
          position: 'left',
          title: { display: true, text: '观看/触达/互动', font: {size:10} },
          ticks: { callback: function(v) { return v >= 1000 ? (v/1000).toFixed(1)+'K' : v; } }
        },
        y1: {
          type: 'linear',
          position: 'right',
          title: { display: true, text: '新增粉丝', font: {size:10} },
          grid: { drawOnChartArea: false },
          ticks: { callback: function(v) { return v; } }
        }
      }
    }
  });
}

function renderChartAux(data) {
  var periodData = getDataForPeriod(data, currentPeriod);
  if (periodData.length === 0) return;

  periodData = periodData.slice().reverse();
  var labels = periodData.map(function(d) { return d.date.slice(5); });
  var pvData = periodData.map(function(d) { return d.profileVisits || 0; });

  var ctx = document.getElementById('chartAux2').getContext('2d');
  chartAux2 = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{
        label: '主页访问',
        data: pvData,
        backgroundColor: COLORS.profileVisits,
        borderRadius: 4,
        borderSkipped: false
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false }
      },
      scales: {
        y: {
          title: { display: true, text: '主页访问次数', font: {size:10} }
        }
      }
    }
  });
}

// ======================== DATA TABLE ========================
function renderTable(data) {
  var periodData = getDataForPeriod(data, currentPeriod);
  document.getElementById('recordCount').textContent = '共 ' + periodData.length + ' 条';

  if (periodData.length === 0) {
    document.getElementById('dsDataTable').innerHTML = '<div class="empty-state"><p>暂无记录</p></div>';
    return;
  }

  var html = '<table class="data-table"><thead><tr>';
  html += '<th>日期</th><th>观看量</th><th>触达</th><th>互动</th><th>链接点击</th><th>主页访问</th><th>新增粉丝</th><th>粉丝总数</th>';
  html += '</tr></thead><tbody>';

  periodData.forEach(function(d) {
    html += '<tr>';
    html += '<td>' + d.date + '</td>';
    html += '<td class="num">' + fmtNum(d.views) + '</td>';
    html += '<td class="num">' + fmtNum(d.reach) + '</td>';
    html += '<td class="num">' + fmtNum(d.interactions) + '</td>';
    html += '<td class="num">' + (d.linkClicks || 0) + '</td>';
    html += '<td class="num">' + fmtNum(d.profileVisits) + '</td>';
    html += '<td class="num" style="color:' + ((d.follows||0) >= 0 ? 'var(--success)' : 'var(--danger)') + '">' + fmtDelta(d.follows) + '</td>';
    html += '<td class="num">' + (d.total_followers != null ? fmtNum(d.total_followers) : '-') + '</td>';
    html += '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('dsDataTable').innerHTML = html;
}

// ======================== AI ANALYSIS ========================
function renderAI(data) {
  var periodData = getDataForPeriod(data, currentPeriod);
  document.getElementById('aiPeriodLabel').textContent = '基于近' + currentPeriod + '天数据分析';

  if (periodData.length < 3) {
    document.getElementById('aiGrid').innerHTML = '<div class="ai-empty">数据不足（需至少3天数据），无法进行AI分析</div>';
    return;
  }

  var n = periodData.length;
  var sumViews = 0, sumReach = 0, sumInt = 0, sumPV = 0, sumFollows = 0;
  var maxViews = 0, maxReach = 0, maxInt = 0, minViews = Infinity, minReach = Infinity, minInt = Infinity;
  var bestDay = '', worstDay = '', bestIntDay = '';

  periodData.forEach(function(d) {
    sumViews += d.views || 0;
    sumReach += d.reach || 0;
    sumInt += d.interactions || 0;
    sumPV += d.profileVisits || 0;
    sumFollows += d.follows || 0;

    if ((d.views||0) > maxViews) { maxViews = d.views; bestDay = d.date; }
    if ((d.views||0) < minViews) { minViews = d.views; worstDay = d.date; }
    if ((d.interactions||0) > maxInt) { maxInt = d.interactions; bestIntDay = d.date; }
    if ((d.reach||0) > maxReach) { maxReach = d.reach; }
  });

  var avgViews = Math.round(sumViews / n);
  var avgReach = Math.round(sumReach / n);
  var avgInt = Math.round(sumInt / n);
  var avgPV = Math.round(sumPV / n);

  // Engagement rate: interactions / views * 100
  var engRate = sumViews > 0 ? (sumInt / sumViews * 100).toFixed(2) : '0';
  // Reach rate: views / reach * 100
  var reachRate = sumReach > 0 ? (sumViews / sumReach * 100).toFixed(1) : '0';

  // Trend detection (compare first half vs second half)
  var half = Math.floor(n / 2);
  var firstHalf = periodData.slice(0, half);
  var secondHalf = periodData.slice(half);
  var fhViews = firstHalf.reduce(function(s,d) { return s + (d.views||0); }, 0);
  var shViews = secondHalf.reduce(function(s,d) { return s + (d.views||0); }, 0);
  var viewsTrend = shViews > fhViews ? 'up' : 'down';
  var viewsChange = fhViews > 0 ? ((shViews - fhViews) / fhViews * 100).toFixed(1) : '0';

  var fhInt = firstHalf.reduce(function(s,d) { return s + (d.interactions||0); }, 0);
  var shInt = secondHalf.reduce(function(s,d) { return s + (d.interactions||0); }, 0);
  var intTrend = shInt > fhInt ? 'up' : 'down';
  var intChange = fhInt > 0 ? ((shInt - fhInt) / fhInt * 100).toFixed(1) : '0';

  var fhFollows = firstHalf.reduce(function(s,d) { return s + (d.follows||0); }, 0);
  var shFollows = secondHalf.reduce(function(s,d) { return s + (d.follows||0); }, 0);
  var followsTrend = shFollows > fhFollows ? 'up' : 'down';

  // Platform-specific labels
  var isXHS = currentPlatform === 'xhs';
  var viewsLabel = isXHS ? '观看量' : '观看量';

  // Insights grid
  var insightsHtml = '';
  insightsHtml += buildInsightCard('日均' + viewsLabel, fmtNum(avgViews), '峰值 ' + fmtNum(maxViews) + ' (' + bestDay + ')', '');
  insightsHtml += buildInsightCard('日均触达', fmtNum(avgReach), '峰值 ' + fmtNum(maxReach), '');
  insightsHtml += buildInsightCard('日均互动', fmtNum(avgInt), '峰值 ' + fmtNum(maxInt) + ' (' + bestIntDay + ')', '');
  insightsHtml += buildInsightCard('日均主页访问', fmtNum(avgPV), '', '');
  insightsHtml += buildInsightCard('互动率', engRate + '%', '互动 / 观看', '');
  insightsHtml += buildInsightCard('观看转化率', reachRate + '%', '观看 / 触达', '');
  insightsHtml += buildInsightCard('观看趋势', (viewsTrend === 'up' ? '↑ ' : '↓ ') + viewsChange + '%', '后半段 vs 前半段', viewsTrend);
  insightsHtml += buildInsightCard('互动趋势', (intTrend === 'up' ? '↑ ' : '↓ ') + intChange + '%', '后半段 vs 前半段', intTrend);

  // Suggestions
  var suggestionsHtml = '<div class="ai-suggestions"><div class="ai-title">运营建议</div>';
  var suggestions = [];

  if (viewsTrend === 'down') {
    suggestions.push('观看量呈下降趋势（' + viewsChange + '%），建议增加发布频率或优化内容选题。');
  } else {
    suggestions.push('观看量呈上升趋势（+' + viewsChange + '%），当前内容策略有效，可加大投入。');
  }

  if (parseFloat(engRate) < 5) {
    suggestions.push('互动率偏低（' + engRate + '%），建议在内容中加入更多互动引导（提问、投票等）。');
  } else if (parseFloat(engRate) > 10) {
    suggestions.push('互动率表现优秀（' + engRate + '%），继续保持互动引导策略。');
  }

  if (sumFollows < 0) {
    suggestions.push('近' + currentPeriod + '天粉丝净流失 ' + Math.abs(sumFollows) + ' 人，需关注内容质量和粉丝留存。');
  } else if (sumFollows === 0) {
    suggestions.push('近' + currentPeriod + '天粉丝数持平，可尝试跨平台推广或合作引流。');
  } else {
    suggestions.push('近' + currentPeriod + '天净增粉 ' + sumFollows + ' 人，增长势头良好。');
  }

  if (avgPV < 5) {
    suggestions.push('主页访问量较低（日均' + avgPV + '），建议优化个人简介和外部引流渠道。');
  }

  if (parseFloat(reachRate) < 5) {
    suggestions.push('观看转化率偏低（' + reachRate + '%），内容封面和标题可能需要优化。');
  }

  suggestions.forEach(function(s) {
    suggestionsHtml += '<div class="ai-suggestion-item"><div class="ai-bullet"></div><div>' + s + '</div></div>';
  });
  suggestionsHtml += '</div>';

  document.getElementById('aiGrid').innerHTML = '<div class="ai-insights">' + insightsHtml + '</div>' + suggestionsHtml;
}

function buildInsightCard(label, value, sub, trendCls) {
  var trendHtml = trendCls ? '<div class="ai-trend ' + trendCls + '">' + value + '</div>' : '';
  return '<div class="ai-insight-card">' +
    '<div class="ai-label">' + label + '</div>' +
    (trendHtml || '<div class="ai-value">' + value + '</div>') +
    (sub ? '<div class="ai-sub">' + sub + '</div>' : '') +
    '</div>';
}

// ======================== INIT ========================
function init() {
  // Compute follows from daily total_followers difference for Ins data
  for (var di = 0; di < insData.length; di++) {
    var cur = insData[di];
    var yesterday = di + 1 < insData.length ? insData[di + 1] : null;
    if (cur.total_followers !== null && cur.total_followers !== undefined &&
        yesterday && yesterday.total_followers !== null && yesterday.total_followers !== undefined) {
      insData[di].follows = cur.total_followers - yesterday.total_followers;
    }
  }
  // Compute follows for XHS data
  for (var xi = 0; xi < xhsData.length; xi++) {
    var xcur = xhsData[xi];
    var xyesterday = xi + 1 < xhsData.length ? xhsData[xi + 1] : null;
    if (xcur.total_followers !== null && xcur.total_followers !== undefined &&
        xyesterday && xyesterday.total_followers !== null && xyesterday.total_followers !== undefined) {
      xhsData[xi].follows = xcur.total_followers - xyesterday.total_followers;
    }
  }

  // Sort both datasets by date descending
  insData.sort(function(a, b) { return b.date.localeCompare(a.date); });
  xhsData.sort(function(a, b) { return b.date.localeCompare(a.date); });

  updatePageTitle();
  renderAll();
}

document.addEventListener('DOMContentLoaded', init);
</script>
