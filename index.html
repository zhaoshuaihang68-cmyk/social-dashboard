<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>社交媒体数据仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f8f9fc;--card:#fff;--border:#e8ecf1;--text:#1a1a2e;--muted:#8e8ea0;--ins:#e1306c;--xhs:#ff2442;--radius:14px;--shadow:0 2px 12px rgba(0,0,0,0.05);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:28px 36px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
.header h1{font-size:1.6rem;font-weight:800;letter-spacing:-0.02em;}
.toggle-group{display:flex;gap:0;background:rgba(255,255,255,0.15);border-radius:10px;overflow:hidden;}
.toggle-btn{padding:9px 24px;font-size:0.82rem;font-weight:700;border:none;cursor:pointer;background:transparent;color:rgba(255,255,255,0.75);transition:all 0.2s;white-space:nowrap;}
.toggle-btn.active{background:#fff;color:#1a1a2e;}
.toggle-btn:hover:not(.active){background:rgba(255,255,255,0.1);}
.main{padding:24px 36px;max-width:1400px;margin:0 auto;}
.platform-title{font-size:1.05rem;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.platform-title .dot{width:12px;height:12px;border-radius:50%;display:inline-block;}
.platform-title .dot.ins-dot-bg{background:var(--ins);}
.platform-title .dot.xhs-dot-bg{background:var(--xhs);}
.overview-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:20px;}
.overview-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
.overview-card .label{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}
.overview-card .value{font-size:1.5rem;font-weight:800;margin:4px 0;}
.platform-summary{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);margin-bottom:20px;display:flex;flex-wrap:wrap;gap:12px 32px;align-items:center;}
.platform-summary .ps-metric{text-align:center;}
.platform-summary .ps-metric .ml{font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;}
.platform-summary .ps-metric .mv{font-size:1.3rem;font-weight:700;}
.platform-summary .followers-info{margin-left:auto;font-size:0.75rem;display:flex;align-items:center;gap:6px;}
.platform-summary .followers-info strong{font-size:1rem;}
.chart-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);margin-bottom:14px;}
.chart-box h4{font-size:0.85rem;font-weight:700;color:var(--text);margin-bottom:10px;}
.chart-wrap{position:relative;height:360px;}
.chart-wrap canvas{width:100%!important;}
.data-table-section{margin-bottom:20px;}
.data-table-section h3{font-size:0.85rem;font-weight:700;margin-bottom:10px;}
.table-wrap{overflow-x:auto;max-height:500px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius);}
table{width:100%;border-collapse:collapse;font-size:0.73rem;}
th{background:#f3eeff;padding:9px 10px;text-align:left;font-weight:700;color:#5b21b6;border-bottom:2px solid #d8c9ff;position:sticky;top:0;z-index:1;white-space:nowrap;}
td{padding:7px 10px;border-bottom:1px solid #f0f0f5;white-space:nowrap;}
.num{text-align:right;font-variant-numeric:tabular-nums;}
tr:hover td{background:rgba(124,58,237,0.04);}
.total-row td{font-weight:700;background:#faf8ff;border-top:2px solid #d8c9ff;}
.footer{text-align:center;padding:24px;color:var(--muted);font-size:0.7rem;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px;}
.hidden{display:none!important;}
</style>
</head>
<body>

<div class="header">
  <div><h1>社交媒体数据仪表盘</h1></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
    <div class="toggle-group" id="timeToggle">
      <button class="toggle-btn" data-days="7">7天</button>
      <button class="toggle-btn" data-days="30">30天</button>
      <button class="toggle-btn active" data-days="90">90天</button>
    </div>
    <div class="toggle-group" id="platformToggle">
      <button class="toggle-btn active" id="btnIns" onclick="switchPlatform(&#39;ins&#39;)">Instagram</button>

    </div>
  </div>
</div>

<div class="main">

    </div>
    <div class="data-table-section">
      <h3>每日明细 - Instagram</h3>
      <div class="table-wrap" id="tableIns"></div>
    </div>
  </div>

  <div id="sectionXhs" class="hidden">

      <div class="table-wrap" id="tableXhs"></div>
    </div>
  </div>

  <div class="footer">生成时间：2026-06-25 | 数据来源：Instagram + 小红书画像 Creator Studio</div>
</div>

var currentDays = 90;
var currentPlatform = "ins";
var insCharts = { combined: null };
var xhsCharts = { combined: null };

function sliceData(data, days) { return data.slice(-days); }
function sumData(data, key) { var s=0; for(var i=0;i<data.length;i++) s += data[i][key]||0; return s; }

function switchPlatform(p) {
  currentPlatform = p;
  document.getElementById("btnIns").classList.toggle("active", p==="ins");
  document.getElementById("btnXhs").classList.toggle("active", p==="xhs");
  document.getElementById("sectionIns").classList.toggle("hidden", p!=="ins");
  document.getElementById("sectionXhs").classList.toggle("hidden", p!=="xhs");
  if(p==="ins") { if(insCharts.combined) insCharts.combined.resize(); }
  else { if(xhsCharts.combined) xhsCharts.combined.resize(); }
}

function buildPlatform(pfx, rawData, accent, days) {
  var data = sliceData(rawData, days);
  var lbs = []; for(var i=0;i<data.length;i++) lbs.push(data[i].date.slice(5));
  var ccid = "chart" + (pfx==="ins"?"Ins":"Xhs") + "Combined";
  var charts = pfx==="ins" ? insCharts : xhsCharts;
  buildOverview("overview"+(pfx==="ins"?"Ins":"Xhs"), data, accent);
  buildSummary("summary"+(pfx==="ins"?"Ins":"Xhs"), data, accent);
  buildTable("table"+(pfx==="ins"?"Ins":"Xhs"), data);
  if(charts.combined) charts.combined.destroy();
  charts.combined = makeCombinedChart(ccid, data, lbs, accent);
  if(currentPlatform === pfx) { charts.combined.resize(); }
}

function rebuildAll(days) {
  currentDays = days;
  buildPlatform("ins", insData, "#e1306c", days);
  buildPlatform("xhs", xhsData, "#ff2442", days);
}

var metricLabels = {views:"观看量",reach:"触达",interactions:"互动",profileVisits:"主页访问",follows:"新增粉丝"};
var order = ["views","reach","interactions","profileVisits","follows"];

function buildOverview(gridId, data, accent) {
  var g = document.getElementById(gridId); g.innerHTML = "";
  for(var oi=0;oi<order.length;oi++) {
    var k = order[oi];
    var c = document.createElement("div"); c.className = "overview-card";
    c.style.borderLeft = "3px solid "+accent;
    c.innerHTML = '<div class="label">'+metricLabels[k]+'</div><div class="value">'+sumData(data,k).toLocaleString()+'</div>';
    g.appendChild(c);
  }
}

function buildSummary(summaryId, data, accent) {
  var f0=data[0].total_followers, f1=data[data.length-1].total_followers, d=f1-f0;
  document.getElementById(summaryId).innerHTML =
    '<div class="ps-metric"><div class="ml">数据条目</div><div class="mv">'+data.length+'</div></div>' +
    '<div class="ps-metric"><div class="ml">日期范围</div><div class="mv" style="font-size:0.78rem;font-weight:600;">'+data[0].date+' &rarr; '+data[data.length-1].date+'</div></div>' +
    '<div class="followers-info" style="border-left:3px solid '+accent+';padding-left:14px;">' +
    '粉丝总数: <strong>'+f0.toLocaleString()+'</strong> &rarr; <strong>'+f1.toLocaleString()+'</strong> (&Delta;'+(d>=0?"+":"")+d.toLocaleString()+')</div>';
}

function buildTable(tableId, data) {
  var h='<table><thead><tr><th>日期</th><th class="num">观看量</th><th class="num">触达</th><th class="num">互动</th>';
  h+='<th class="num">主页访问</th><th class="num">新增粉丝</th><th class="num">粉丝总数</th></tr></thead><tbody>';
  var tv=0,tr=0,ti=0,tp=0,tf=0;
  var sorted = data.slice().reverse();
  for(var i=0;i<sorted.length;i++) {
    var d=sorted[i];
    tv+=d.views; tr+=d.reach; ti+=d.interactions; tp+=d.profileVisits; tf+=d.follows;
    h+='<tr><td>'+d.date+'</td><td class="num">'+(d.views||0).toLocaleString()+'</td>';
    h+='<td class="num">'+(d.reach||0).toLocaleString()+'</td>';
    h+='<td class="num">'+(d.interactions||0).toLocaleString()+'</td>';
    h+='<td class="num">'+(d.profileVisits||0).toLocaleString()+'</td>';
    h+='<td class="num">'+(d.follows||0).toLocaleString()+'</td>';
    h+='<td class="num">'+(d.total_followers||0).toLocaleString()+'</td></tr>';
  }
  h+='<tr class="total-row"><td><strong>合计</strong></td>';
  h+='<td class="num"><strong>'+tv.toLocaleString()+'</strong></td>';
  h+='<td class="num"><strong>'+tr.toLocaleString()+'</strong></td>';
  h+='<td class="num"><strong>'+ti.toLocaleString()+'</strong></td>';
  h+='<td class="num"><strong>'+tp.toLocaleString()+'</strong></td>';
  h+='<td class="num"><strong>'+tf.toLocaleString()+'</strong></td><td class="num"></td></tr></tbody></table>';
  document.getElementById(tableId).innerHTML = h;
}

function makeCombinedChart(cid, data, labels, accent) {
  var ctx = document.getElementById(cid).getContext("2d");
  var viewsData=[], reachData=[], intData=[], folData=[];
  for(var i=0;i<data.length;i++){
    viewsData.push(data[i].views);
    reachData.push(data[i].reach);
    intData.push(data[i].interactions);
    folData.push(data[i].follows||0);
  }
  return new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        {label:"观看量",data:viewsData,borderColor:accent,backgroundColor:accent.replace(")",",0.1)").replace("rgb","rgba"),tension:0.3,pointRadius:2,pointHoverRadius:5,borderWidth:3.5,fill:true,yAxisID:"y"},
        {label:"触达",data:reachData,borderColor:"#f39c12",backgroundColor:"rgba(243,156,18,0.1)",tension:0.3,pointRadius:2,pointHoverRadius:5,borderWidth:3.5,fill:true,yAxisID:"y1"},
        {label:"互动",data:intData,borderColor:"#00b894",backgroundColor:"rgba(0,184,148,0.1)",tension:0.3,pointRadius:2,pointHoverRadius:5,borderWidth:3.5,fill:true,yAxisID:"y"},
        {label:"新增粉丝",data:folData,borderColor:"#6c5ce7",backgroundColor:"rgba(108,92,231,0.1)",tension:0.3,pointRadius:2,pointHoverRadius:5,borderWidth:3.5,fill:true,yAxisID:"y2",borderDash:[5,3]}
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend:{position:"top",labels:{boxWidth:14,padding:14,font:{size:11}}},
        title:{display:true,text:"观看量 / 触达 / 互动 / 新增粉丝 趋势",font:{size:14,weight:"bold"},padding:{bottom:8}}
      },
      scales: {
        x: {ticks:{maxTicksLimit:10,font:{size:9}},grid:{display:false}},
        y: {
          type:"linear",
          position:"left",
          beginAtZero:true,
          title:{display:true,text:"观看量 / 互动",font:{size:10,weight:"bold"}},
          ticks:{font:{size:9}}
        },
        y1: {
          type:"linear",
          position:"right",
          beginAtZero:true,
          title:{display:true,text:"触达",font:{size:10,weight:"bold"}},
          ticks:{font:{size:9}},
          grid:{display:false}
        },
        y2: {
          type:"linear",
          position:"right",
          beginAtZero:true,
          title:{display:true,text:"新增粉丝",font:{size:10,weight:"bold"}},
          ticks:{font:{size:9}},
          grid:{display:false}
        }
      },
      interaction: {intersect:false,mode:"index"}
    }
  });
}

document.getElementById("timeToggle").addEventListener("click", function(e) {
  var btn = e.target.closest("button");
  if(!btn) return;
  var days = parseInt(btn.getAttribute("data-days"));
  if(days === currentDays) return;
  this.querySelectorAll(".toggle-btn").forEach(function(b){ b.classList.remove("active"); });
  btn.classList.add("active");
  rebuildAll(days);
});

rebuildAll(90);</script>
