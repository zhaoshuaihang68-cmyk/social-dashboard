<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram & 小红书 社交媒体仪表盘</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg-primary: #f5f6fa;
  --bg-secondary: #ffffff;
  --bg-card: #ffffff;
  --bg-input: #f9fafb;
  --border: #e5e7eb;
  --text-primary: #1a1a2e;
  --text-secondary: #4a4a6a;
  --text-muted: #8e8ea0;
  --accent: #7c3aed;
  --accent2: #00cec9;
  --success: #00b894;
  --danger: #ff7675;
  --warning: #fdcb6e;
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 2px 12px rgba(0,0,0,0.06);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family: -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  background: var(--bg-primary); color: var(--text-primary); min-height:100vh;
}
.header{
  background: #ffffff; border-bottom:1px solid #e5e7eb;
  padding:16px 28px; display:flex; align-items:center; justify-content:space-between;
  flex-wrap:wrap; gap:10px;
}
.header h1{font-size:1.3rem;font-weight:700;letter-spacing:-0.02em;}
.header .sub{font-size:0.72rem;color:var(--text-muted);display:block;}
.main{padding:20px 28px 28px;max-width:1400px;margin:0 auto;}
.btn{padding:8px 16px;border-radius:8px;font-size:0.78rem;font-weight:600;cursor:pointer;
  border:1px solid var(--border);transition:all .2s;font-family:inherit;}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#6d28d9;}
.btn-secondary{background:var(--bg-input);color:var(--text-primary);}
.btn-secondary:hover{background:#e5e7eb;}
.btn-danger{background:transparent;color:var(--danger);border-color:var(--danger);}
.btn-danger:hover{background:rgba(255,118,117,0.12);}
.btn-sm{padding:5px 10px;font-size:0.7rem;}
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.card-header h3{font-size:0.9rem;font-weight:700;}
.fallback-banner{
  display:none; align-items:center; justify-content:space-between;
  background: linear-gradient(135deg, rgba(124,58,237,0.06), rgba(155,89,182,0.04));
  border:1px solid rgba(124,58,237,0.18); border-radius:var(--radius-sm);
  padding:10px 18px; margin-bottom:18px; font-size:0.78rem; color:#7c3aed;
}
.fallback-banner.show{display:flex;}
.fallback-banner .banner-close{
  background:none; border:none; color:#8e8ea0; cursor:pointer; font-size:1.1rem;
  padding:0 4px; line-height:1; transition:color .2s;
}
.fallback-banner .banner-close:hover{color:#1a1a2e;}
.card-header .sub{font-size:0.7rem;color:var(--text-muted);}
.metrics-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:10px;margin-bottom:18px;}
.total-followers-card{
  background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(155,89,182,0.05));
  border:1.5px solid rgba(124,58,237,0.2); border-radius:var(--radius-sm);
  padding:13px 15px; position:relative;
}
.total-followers-card .tf-label{font-size:0.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
.total-followers-card .tf-value{font-size:1.5rem;font-weight:800;color:var(--text-primary);margin:4px 0;letter-spacing:-0.02em;}
.total-followers-card .tf-sub{font-size:0.68rem;color:var(--text-muted);}
.total-followers-card .change{font-size:0.7rem;margin-top:2px;}
.total-followers-card .change.up{color:var(--success);}
.total-followers-card .change.down{color:var(--danger);}
.total-followers-card .change.flat{color:var(--text-muted);}
.metric-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;}
.metric-card .label{font-size:0.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;}
.metric-card .value{font-size:1.5rem;font-weight:800;margin:3px 0;}
.metric-card .change{font-size:0.7rem;margin-top:2px;}
.metric-card .change.up{color:var(--success);}
.metric-card .change.down{color:var(--danger);}
.metric-card .change.flat{color:var(--text-muted);}
.period-pills{display:flex;gap:6px;margin-bottom:16px;align-items:center;}
.period-pills .label{font-size:0.7rem;color:var(--text-muted);margin-right:6px;}
.period-pill{padding:6px 18px;border-radius:99px;font-size:0.74rem;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--bg-input);color:var(--text-secondary);transition:all .2s;font-family:inherit;}
.period-pill:hover{border-color:var(--accent);color:var(--text-primary);}
.period-pill.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.platform-tabs{display:flex;gap:6px;align-items:center;margin-left:16px;}
.platform-tab{padding:6px 16px;border-radius:99px;font-size:0.74rem;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--bg-input);color:var(--text-secondary);transition:all .2s;font-family:inherit;}
.platform-tab:hover{border-color:var(--accent);color:var(--text-primary);}
.platform-tab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.period-note{font-size:0.68rem;color:var(--text-muted);margin-left:auto;}
.summary-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;margin-bottom:18px;}
.summary-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 15px;}
.summary-card .label{font-size:0.66rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em;}
.summary-card .main-val{font-size:1.25rem;font-weight:800;margin:2px 0;}
.summary-card .sub-val{font-size:0.7rem;color:var(--text-muted);}
.summary-card.followers{border-left:3px solid var(--accent);border-color:#9b59b6;box-shadow:inset 0 0 30px rgba(124,58,237,0.03);}
.chart-box{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:18px;}
.chart-box h4{font-size:0.8rem;color:#4a4a6a;margin-bottom:10px;}
.chart-wrap{position:relative;height:300px;}
.chart-wrap.small{height:240px;}
.chart-wrap canvas{width:100%!important;}
.table-wrap{overflow-x:auto;max-height:420px;overflow-y:auto;}
.data-table{width:100%;border-collapse:collapse;font-size:0.76rem;}
.data-table th{background:#f3eeff;padding:9px 10px;text-align:left;font-weight:700;color:#5b21b6;border-bottom:2px solid #d8c9ff;position:sticky;top:0;z-index:1;white-space:nowrap;}
.data-table td{padding:7px 10px;border-bottom:1px solid #f0f0f5;white-space:nowrap;}
.data-table tr:hover td{background:rgba(124,58,237,0.04);}
.data-table .num{text-align:right;font-variant-numeric:tabular-nums;}
.empty-state{text-align:center;padding:48px 16px;color:var(--text-muted);}
.empty-state p{font-size:0.82rem;}
.ai-section{margin-top:18px;}
.ai-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:760px){.ai-grid{grid-template-columns:1fr;}}
.ai-insights{display:grid;grid-template-columns:1fr 1fr;gap:8px;align-content:start;}
.ai-insight-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;}
.ai-insight-card .ai-label{font-size:0.62rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
.ai-insight-card .ai-value{font-size:1.05rem;font-weight:800;color:var(--text-primary);}
.ai-insight-card .ai-sub{font-size:0.66rem;color:var(--text-muted);margin-top:2px;}
.ai-insight-card .ai-trend.up{color:var(--success);}
.ai-insight-card .ai-trend.down{color:var(--danger);}
.ai-suggestions{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;}
.ai-suggestions .ai-title{font-size:0.72rem;font-weight:700;color:var(--accent);margin-bottom:10px;letter-spacing:.03em;}
.ai-suggestion-item{display:flex;gap:8px;margin-bottom:8px;font-size:0.72rem;color:var(--text-secondary);line-height:1.5;align-items:flex-start;}
.ai-suggestion-item:last-child{margin-bottom:0;}
.ai-bullet{flex-shrink:0;width:8px;height:8px;border-radius:50%;background:#9b59b6;margin-top:5px;}
.ai-empty{text-align:center;padding:24px;color:var(--text-muted);font-size:0.74rem;grid-column:1/-1;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:99px;}
</style>
</head>

<div class="header">
  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:10px;">
    <div><h1 id="pageTitle">社交媒体数据总览</h1><span class="sub" id="pageSub">每日快照 · 趋势追踪 · 数据驱动</span></div>
    <div class="platform-tabs" id="platformTabs">

</div>

<div class="main">

  <div class="summary-row" id="summaryCards"></div>

  <div class="chart-box">

  </div>

  <div class="chart-box">

  <div class="card">

  <div class="ai-section" id="aiSection">

    <div class="ai-grid" id="aiGrid"></div>
  </div>
</div>

// ============ STATE ============
var currentPlatform = 'ins';
var currentPeriod = 30;
var chartMain = null;
var chartAux = null;

// ============ HELPERS ============
function fmt(n) {
  if (n === null || n === undefined) return '0';
  return Number(n).toLocaleString();
}

function fmtChange(curr, prev) {
  if (!prev || prev === 0) return '<span class="change flat">--</span>';
  var pct = ((curr - prev) / prev * 100).toFixed(1);
  var cls = pct > 0 ? 'up' : (pct < 0 ? 'down' : 'flat');
  var sign = pct > 0 ? '+' : '';
  return '<span class="change ' + cls + '">' + sign + pct + '%</span>';
}

function getPeriodData(data, days) {
  if (!data || data.length === 0) return [];
  var cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - days);
  var cutoffStr = cutoff.toISOString().slice(0,10);
  return data.filter(function(d) { return d.date >= cutoffStr; });
}

// ============ PLATFORM SWITCHING ============
function switchPlatform(platform) {
  var tabs = document.querySelectorAll('.platform-tab');
  tabs.forEach(function(t) { t.classList.remove('active'); });
  document.querySelector('.platform-tab[data-platform="' + platform + '"]').classList.add('active');

  currentPlatform = platform;
  var banner = document.getElementById('fallbackBanner');
  var bannerText = document.getElementById('fallbackText');

  if (platform === 'ins') {
    document.getElementById('pageTitle').textContent = 'Instagram 数据总览';
    document.getElementById('pageSub').textContent = '每日快照 · 趋势追踪 · 数据驱动';
    if (insData.length === 0) {
      bannerText.textContent = 'Instagram 暂无数据，已自动切换至小红书';
      banner.classList.add('show');
      currentPlatform = 'xhs';
      document.querySelector('.platform-tab[data-platform="xhs"]').classList.add('active');
      tabs.forEach(function(t) { t.classList.remove('active'); });
      document.querySelector('.platform-tab[data-platform="xhs"]').classList.add('active');
    } else {
      banner.classList.remove('show');
    }
  } else {
    document.getElementById('pageTitle').textContent = '小红书 数据总览';
    document.getElementById('pageSub').textContent = '每日快照 · 趋势追踪 · 数据驱动';
    if (xhsData.length === 0) {
      bannerText.textContent = '小红书暂无数据，已自动切换至Instagram';
      banner.classList.add('show');
      currentPlatform = 'ins';
      document.querySelector('.platform-tab[data-platform="ins"]').classList.add('active');
      tabs.forEach(function(t) { t.classList.remove('active'); });
      document.querySelector('.platform-tab[data-platform="ins"]').classList.add('active');
    } else {
      banner.classList.remove('show');
    }
  }
  renderAll();
}

function getActiveData() {
  return currentPlatform === 'ins' ? insData : xhsData;
}

// ============ PERIOD ============
function setPeriod(days) {
  currentPeriod = days;
  document.querySelectorAll('.period-pill').forEach(function(p) {
    p.classList.remove('active');
  });
  document.querySelector('.period-pill[data-days="' + days + '"]').classList.add('active');
  renderAll();
}

// ============ RENDER ALL ============
function renderAll() {
  var data = getActiveData();
  var periodData = getPeriodData(data, currentPeriod);

  document.getElementById('periodNote').textContent =
    (periodData.length > 0)
      ? periodData[periodData.length-1].date + ' ~ ' + periodData[0].date + ' (' + periodData.length + ' days)'
      : 'No data';

  renderOverviewCards(data);
  renderSummaryCards(periodData);
  renderCharts(periodData);
  renderTable(periodData);
  renderAI(periodData);
}

// ============ OVERVIEW CARDS ============
function renderOverviewCards(data) {
  var container = document.getElementById('overviewCards');
  if (!data || data.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>暂无数据</p></div>';
    return;
  }

  var latest = data[0];
  var prev = data.length > 1 ? data[1] : null;
  var prev7 = data.length > 7 ? data[7] : null;

  // Compute 7-day totals
  var d7 = data.slice(0, Math.min(7, data.length));
  var views7 = d7.reduce(function(s,d){return s+d.views;},0);
  var reach7 = d7.reduce(function(s,d){return s+d.reach;},0);
  var interactions7 = d7.reduce(function(s,d){return s+d.interactions;},0);
  var pf7 = d7.reduce(function(s,d){return s+d.profileVisits;},0);
  var fo7 = d7.reduce(function(s,d){return s+d.follows;},0);

  // Previous 7 days
  var prev7data = data.slice(7, Math.min(14, data.length));
  var views7prev = prev7data.reduce(function(s,d){return s+d.views;},0) || 1;

  var tfChange = '';
  if (data.length >= 8) {
    var tf7 = data[7].total_followers || 0;
    if (tf7 > 0) {
      var pct = ((latest.total_followers - tf7) / tf7 * 100).toFixed(1);
      var cls = pct > 0 ? 'up' : (pct < 0 ? 'down' : 'flat');
      var sign = pct > 0 ? '+' : '';
      tfChange = '<span class="change ' + cls + '">' + sign + pct + '% (7d)</span>';
    }
  }

  container.innerHTML =
    '<div class="total-followers-card">' +
      '<div class="tf-label">粉丝总数</div>' +
      '<div class="tf-value">' + fmt(latest.total_followers) + '</div>' +
      '<div class="tf-sub">Latest: ' + latest.date + '</div>' +
      tfChange +
    '</div>' +
    '<div class="metric-card">' +
      '<div class="label">观看量 (7d)</div>' +
      '<div class="value">' + fmt(views7) + '</div>' +
      '<div class="change" style="color:var(--text-muted)">日均 ' + fmt(Math.round(views7/7)) + '</div>' +
    '</div>' +
    '<div class="metric-card">' +
      '<div class="label">触达 (7d)</div>' +
      '<div class="value">' + fmt(reach7) + '</div>' +
      '<div class="change" style="color:var(--text-muted)">日均 ' + fmt(Math.round(reach7/7)) + '</div>' +
    '</div>' +
    '<div class="metric-card">' +
      '<div class="label">互动 (7d)</div>' +
      '<div class="value">' + fmt(interactions7) + '</div>' +
      '<div class="change" style="color:var(--text-muted)">日均 ' + fmt(Math.round(interactions7/7)) + '</div>' +
    '</div>' +
    '<div class="metric-card">' +
      '<div class="label">主页访问 (7d)</div>' +
      '<div class="value">' + fmt(pf7) + '</div>' +
      '<div class="change" style="color:var(--text-muted)">日均 ' + fmt(Math.round(pf7/7)) + '</div>' +
    '</div>' +
    '<div class="metric-card">' +
      '<div class="label">新增粉丝 (7d)</div>' +
      '<div class="value">' + fmt(fo7) + '</div>' +
      '<div class="change" style="color:var(--text-muted)">日均 ' + fmt(Math.round(fo7/7)) + '</div>' +
    '</div>';
}

function renderSummaryCards(periodData) {
  var container = document.getElementById('summaryCards');
  if (!periodData || periodData.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>暂无数据</p></div>';
    return;
  }

  var totalViews = periodData.reduce(function(s,d){return s+d.views;},0);
  var totalReach = periodData.reduce(function(s,d){return s+d.reach;},0);
  var totalInter = periodData.reduce(function(s,d){return s+d.interactions;},0);
  var totalPV = periodData.reduce(function(s,d){return s+d.profileVisits;},0);
  var totalFol = periodData.reduce(function(s,d){return s+d.follows;},0);
  var days = periodData.length;
  var first = periodData[periodData.length-1];
  var last = periodData[0];
  var tfChange = 0;
  if (first && last && first.total_followers > 0 && last.total_followers > 0) {
    tfChange = last.total_followers - first.total_followers;
  }

  container.innerHTML =
    '<div class="summary-card followers">' +
      '<div class="label">粉丝变化</div>' +
      '<div class="main-val">' + (tfChange >= 0 ? '+' : '') + fmt(tfChange) + '</div>' +
      '<div class="sub-val">' + first.date + ' → ' + last.date + '</div>' +
    '</div>' +
    '<div class="summary-card">' +

// ============ CHARTS ============
function renderCharts(periodData) {
  if (chartMain) { chartMain.destroy(); chartMain = null; }
  if (chartAux) { chartAux.destroy(); chartAux = null; }

  if (!periodData || periodData.length === 0) {
    document.getElementById('chartMainTitle').textContent = '暂无数据';
    document.getElementById('chartAuxTitle').textContent = '暂无数据';
    return;
  }

  // Reverse for chronological order
  var d = periodData.slice().reverse();
  var labels = d.map(function(x){return x.date.slice(5);});
  var views = d.map(function(x){return x.views;});
  var reach = d.map(function(x){return x.reach;});
  var interactions = d.map(function(x){return x.interactions;});
  var follows = d.map(function(x){return x.follows;});
  var pv = d.map(function(x){return x.profileVisits;});

  chartMain = new Chart(ctx1, {

// ============ DATA TABLE ============
function renderTable(periodData) {
  var container = document.getElementById('dsDataTable');
  document.getElementById('recordCount').textContent = periodData.length + ' records';
  if (!periodData || periodData.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>暂无数据</p></div>';

  var rows = periodData.map(function(d) {
    return '<tr>' +
      '<td>' + d.date + '</td>' +
      '<td class="num">' + fmt(d.views) + '</td>' +
      '<td class="num">' + fmt(d.reach) + '</td>' +
      '<td class="num">' + fmt(d.interactions) + '</td>' +
      '<td class="num">' + fmt(d.linkClicks || 0) + '</td>' +
      '<td class="num">' + fmt(d.profileVisits) + '</td>' +
      '<td class="num">' + fmt(d.follows) + '</td>' +
      '<td class="num" style="font-weight:700;color:#7c3aed">' + fmt(d.total_followers) + '</td>' +
      '</tr>';
  }).join('');

  container.innerHTML =
    '<table class="data-table">' +
      '<thead><tr>' +
        '<th>日期</th><th class="num">观看量</th><th class="num">触达</th>' +
        '<th class="num">互动</th><th class="num">链接点击</th>' +

        '<th class="num">粉丝总数</th>' +
      '</tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>';
}

function renderAI(periodData) {
  var grid = document.getElementById('aiGrid');
  document.getElementById('aiPeriodLabel').textContent =
    currentPeriod + '天数据分析 (' + (periodData.length) + '天数据)';

  if (!periodData || periodData.length < 3) {
    grid.innerHTML = '<div class="ai-empty">数据不足，需要至少3天数据进行分析</div>';
    return;
  }

  var d = periodData;
  var days = d.length;
  var totalViews = d.reduce(function(s,x){return s+x.views;},0);
  var totalReach = d.reduce(function(s,x){return s+x.reach;},0);
  var totalInter = d.reduce(function(s,x){return s+x.interactions;},0);
  var totalPV = d.reduce(function(s,x){return s+x.profileVisits;},0);
  var totalFol = d.reduce(function(s,x){return s+x.follows;},0);

  // Engagement rate
  var engRate = totalReach > 0 ? (totalInter / totalReach * 100).toFixed(1) : '0.0';

  // Peak day
  var peakViews = d.reduce(function(a,b){return a.views>b.views?a:b;});
  var peakInter = d.reduce(function(a,b){return a.interactions>b.interactions?a:b;});

  // Trend direction (compare first half vs second half)
  var half = Math.floor(days / 2);
  var firstHalf = d.slice(0, half);
  var secondHalf = d.slice(half);
  var v1 = firstHalf.reduce(function(s,x){return s+x.views;},0);
  var v2 = secondHalf.reduce(function(s,x){return s+x.views;},0);
  var viewTrend = v2 > v1 ? 'up' : 'down';

  // Most recent trend (last 3 days vs previous 3)
  var recent3 = d.slice(0, Math.min(3, days));
  var prev3 = d.slice(Math.min(3, days), Math.min(6, days));
  var r3v = recent3.reduce(function(s,x){return s+x.views;},0);
  var p3v = prev3.length > 0 ? prev3.reduce(function(s,x){return s+x.views;},0) : 0;

  // Suggestions
  var suggestions = [];
  if (totalReach > 0 && totalInter / totalReach < 0.05) {
    suggestions.push('互动率偏低（' + engRate + '%），建议优化内容CTA或提问式文案提升参与度');
  }
  if (peakViews.views > 0 && peakViews.interactions / Math.max(peakViews.views,1) < 0.01) {
    suggestions.push('高观看量内容（' + peakViews.date + '，' + fmt(peakViews.views) + ' views）互动转化不足，建议在热门内容中添加互动引导');
  }
  if (viewTrend === 'down') {
    suggestions.push('近期观看量呈下降趋势，建议增加发布频率或尝试新的内容形式（Reels/短视频）');
  }
  var pvRate = totalViews > 0 ? (totalPV / totalViews * 100).toFixed(1) : '0';
  if (parseFloat(pvRate) < 1) {
    suggestions.push('主页访问转化率低（' + pvRate + '%），建议优化Bio链接和简介文案');
  }
  if (totalFol <= 0) {
    suggestions.push('粉丝增长停滞，建议策划涨粉活动或合作推广');
  }
  if (suggestions.length === 0) {
    suggestions.push('各项指标表现良好，继续保持内容质量和发布节奏');
  }

  grid.innerHTML =
    '<div class="ai-insights">' +
      '<div class="ai-insight-card">' +
        '<div class="ai-label">互动率</div>' +
        '<div class="ai-value">' + engRate + '%</div>' +
        '<div class="ai-sub">互动/触达</div>' +
      '</div>' +
      '<div class="ai-insight-card">' +
        '<div class="ai-label">峰值观看日</div>' +
        '<div class="ai-value">' + fmt(peakViews.views) + '</div>' +
        '<div class="ai-sub">' + peakViews.date + '</div>' +
      '</div>' +
      '<div class="ai-insight-card">' +
        '<div class="ai-label">峰值互动日</div>' +
        '<div class="ai-value">' + fmt(peakInter.interactions) + '</div>' +
        '<div class="ai-sub">' + peakInter.date + '</div>' +
      '</div>' +
      '<div class="ai-insight-card">' +
        '<div class="ai-label">观看趋势</div>' +
        '<div class="ai-value ai-trend ' + viewTrend + '">' + (viewTrend==='up'?'↑ 上升':'↓ 下降') + '</div>' +
        '<div class="ai-sub">前后半段对比</div>' +
      '</div>' +
    '</div>' +
    '<div class="ai-suggestions">' +
      '<div class="ai-title">优化建议</div>' +
      suggestions.map(function(s){ return '<div class="ai-suggestion-item"><div class="ai-bullet"></div><span>' + s + '</span></div>'; }).join('') +
    '</div>';
}

// ============ INIT ============
document.addEventListener('DOMContentLoaded', function() {
  renderAll();
});
</script>
</body>
</html>
